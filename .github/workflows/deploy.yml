name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Wake the free-tier API (Render sleeps when idle) so build-time fetches hit a warm
      # instance. Best-effort: if it never wakes, ALLOW_SEED_FALLBACK below covers the build.
      - name: Pre-warm API
        if: vars.API_BASE_URL != ''
        run: curl --max-time 90 --retry 5 --retry-all-errors "${{ vars.API_BASE_URL }}/healthz" || true

      - name: Build
        run: npm run build
        env:
          # Set repo variable DATA_SOURCE=api to source public pages from the live API;
          # leave unset to keep building from the local seed (default, zero-config).
          DATA_SOURCE: ${{ vars.DATA_SOURCE }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          # If the API is asleep/unreachable at build time, fall back to seed so the deploy
          # still publishes (content just lags until the next build).
          ALLOW_SEED_FALLBACK: "1"
          # Public, inlined into the client bundle for the portal's live data + auth.
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.API_BASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
